<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none';">

    <title>שירותי אבטחת מידע מקצועיים</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>ייעוץ אבטחת מידע ו-Pen Testing</h1>
            <p>פתרונות הגנה מתקדמים למשרדי עורכי דין ורואי חשבון</p>
        </header>

        <main>
            <div id="status" class="status-box">המערכת מוכנה לסריקה</div>
            <button id="checkBtn">בדיקת תקינות אבטחה</button>

            <section class="contact-section">
                <h3>צור קשר</h3>
                <form id="contactForm">
                    <input type="text" id="userName" placeholder="שם מלא" required>
                    <input type="email" id="userEmail" placeholder="אימייל להתקשרות" required>
                    <textarea id="userMessage" placeholder="כיצד אוכל לסייע?" rows="4" required></textarea>
                    <button type="submit" id="submitBtn">שליחת הודעה</button>
                </form>
                <div id="formResponse"></div>
            </section>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
