<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שירותי אבטחת מידע ו-Pen Testing</title>
    
    <style>
        /* עיצוב בסיסי למניעת בלאגן */
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #1e293b;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }
        .status-box {
            background: #334155;
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #475569;
        }
        input, textarea {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>

    <div class="container">
        <h1>אבטחת מידע ו-IT</h1>
        <p>בדיקות חדירה למשרדי עו"ד ורו"ח</p>
        
        <div id="status" class="status-box">ממתין לבדיקה...</div>
        <button id="checkBtn">בדיקת סטטוס אבטחה</button>

        <form id="contactForm">
            <h3>צור קשר</h3>
            <input type="text" id="userName" placeholder="שם מלא" required>
            <input type="email" id="userEmail" placeholder="אימייל" required>
            <textarea id="userMessage" placeholder="הודעה..." rows="3" required></textarea>
            <button type="submit">שלח הודעה</button>
        </form>
        <div id="formResponse"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
